name: CI

on:
  push:
    branches: [master, staging, develop]
  pull_request:
    branches: [master, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Validate application startup
        run: |
          cd todo_project
          python -c "from todo_project import app; print('Application loaded successfully')"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt
      - name: Run tests
        run: |
          cd todo_project
          python -m pytest tests/ -v --junitxml=report.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.xml

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies + tools
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install bandit pip-audit
      - name: Bandit scan
        run: |
          cd todo_project
          bandit -r . -f json -o ../bandit-report.json --exit-zero
      - name: Bandit — fail on HIGH
        run: |
          python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          high = [r for r in data.get('results', [])
                  if r['issue_severity'] == 'HIGH']
          if high:
              for r in high:
                  print(f'FAIL: {r[\"test_id\"]} {r[\"filename\"]}:{r[\"line_number\"]}')
              exit(1)
          print('No HIGH severity issues found')
          "
      - name: pip-audit scan
        run: |
          pip-audit -r requirements.txt -f json --desc | tee pip-audit-report.json
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  dast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sast
    steps:
      - uses: actions/checkout@v4
      - name: Start app (Docker Compose)
        run: docker compose up -d
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -s -o /dev/null http://localhost:5000/login; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "App failed to start"
          docker compose logs
          exit 1
      - name: ZAP Baseline Scan
        run: |
          mkdir -p zap_report
          NETWORK=$(docker inspect "$(docker compose ps -q app)" \
            --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}' | head -1)
          echo "Network: $NETWORK"
          docker run --rm \
            --network "$NETWORK" \
            -v "$PWD/.zap/rules.tsv":/zap/rules.tsv:ro \
            -v "$PWD/zap_report":/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            /zap/zap-baseline.py \
              -t http://app:5000 \
              -c /zap/rules.tsv \
              -J zap_report.json \
              -r zap_report.html \
              -I
      - name: Summarize ZAP findings
        if: always()
        run: |
          if [ -f zap_report/zap_report.json ]; then
            jq -r '.site[]?.alerts[]? | "  [\(.riskdesc)] \(.name) (x\(.count))"' zap_report/zap_report.json 2>/dev/null
            TOTAL=$(jq '[.site[]?.alerts[]?] | length' zap_report/zap_report.json 2>/dev/null || echo 0)
            echo "Total alerts: $TOTAL"
          else
            echo "ZAP report not found"
          fi
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report/
